<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Animado Ledco</title>
<style>
  body {
    background-color: #0a0e1c; /* Fondo azul oscuro de image_0.png */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .logo-container {
    display: flex;
    align-items: center;
  }

  .text-static {
    color: #ffffff; /* Texto blanco */
    font-size: 64px;
    letter-spacing: 5px;
    font-weight: bold;
    text-transform: uppercase;
    margin-right: -12px; /* Ajuste sutil */
  }

  .ring-o {
    width: 64px;
    height: 64px;
    position: relative;
    margin-top: -12px; /* Ajuste sutil */
  }

  /* El anillo de la O, recreado con SVG */
  .ring-o svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 10px rgba(70, 180, 255, 0.7)) /* Resplandor inicial azul */
           drop-shadow(0 0 10px rgba(255, 170, 70, 0.7)); /* Resplandor inicial naranja */
    animation: glow-pulse 2s infinite ease-in-out; /* La animación del resplandor */
  }

  /* Gradiente cónico para el anillo (azul superior, naranja inferior) */
  .ring-o circle {
    stroke: none;
    fill: url(#led-gradient);
  }

  /* Animación del resplandor */
  @keyframes glow-pulse {
    0%, 100% {
      filter: drop-shadow(0 0 10px rgba(70, 180, 255, 0.7))
             drop-shadow(0 0 10px rgba(255, 170, 70, 0.7));
    }
    50% {
      filter: drop-shadow(0 0 20px rgba(130, 210, 255, 1))
             drop-shadow(0 0 20px rgba(255, 200, 130, 1));
    }
  }
</style>
</head>
<body>

  <div class="logo-container">
    <div class="text-static">LEDC</div>
    <div class="ring-o">
      <svg viewBox="0 0 64 64">
        <defs>
          <conicGradient id="led-gradient" cx="50%" cy="50%" fr="0" r="1">
            <stop offset="0%" stop-color="#46b4ff"/> <stop offset="50%" stop-color="#ffaa46"/> <stop offset="100%" stop-color="#46b4ff"/> </conicGradient>
        </defs>
        <circle cx="32" cy="32" r="30" stroke-width="4"/>
      </svg>
    </div>
  </div>

</body>
</html>
