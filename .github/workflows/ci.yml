name: CI Quality Gate

on:
    push:
        branches: [main]
        paths:
            - "src/**"
            - "package.json"
            - "vite.config.ts"
            - "tsconfig*.json"
    pull_request:
        branches: [main]

jobs:
    quality:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Type check
              run: npx tsc --noEmit

            - name: Run tests
              run: npm run test

            - name: Build
              run: npm run build
